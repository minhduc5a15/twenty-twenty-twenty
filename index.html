<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Twenty Twenty Twenty Reminder — Protect your eyes with regular breaks every 20 minutes" />
    <title>Twenty Twenty Twenty</title>
    <link rel="stylesheet" href="/src/styles.css" />
    <script type="module" src="/src/main.ts"></script>
  </head>
  <body>
    <div id="app" class="app">
      <!-- Animated background orbs -->
      <div class="bg-orbs" aria-hidden="true">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
      </div>

      <!-- Quit Button -->
      <button id="btn-quit-app" class="btn-icon-only btn-quit" title="Quit Application">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
          <polyline points="16 17 21 12 16 7"></polyline>
          <line x1="21" y1="12" x2="9" y2="12"></line>
        </svg>
      </button>

      <!-- Header -->
      <header class="header">
        <div class="header-icon">
          <img src="/src/assets/icon.png" width="40" height="40" alt="App Icon" style="border-radius: 50%;" />
        </div>
        <div class="header-center">
          <h1 class="header-title" id="main-title">20-20-20</h1>
          <p class="header-subtitle">Eye Rest Reminder</p>
        </div>
      </header>
      <button id="btn-open-settings" class="btn-icon-only" title="Settings">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
      </button>

      <!-- Timer Display -->
      <main class="timer-section">
        <div class="timer-ring">
          <svg class="timer-svg" viewBox="0 0 200 200">
            <circle class="timer-track" cx="100" cy="100" r="88" />
            <circle id="timer-progress" class="timer-progress" cx="100" cy="100" r="88" />
          </svg>
          <div class="timer-display">
            <span id="timer-minutes" class="timer-digits">20</span>
            <span class="timer-colon">:</span>
            <span id="timer-seconds" class="timer-digits">00</span>
          </div>
        </div>

        <!-- Status -->
        <div style="display: flex; gap: 12px; justify-content: center; align-items: center;">
          <div id="status-badge" class="status-badge status-running">
            <span class="status-dot"></span>
            <span id="status-text" class="status-text">Running</span>
          </div>
          <div id="strict-badge" class="status-badge status-strict-on">
            <span class="status-dot"></span>
            <span id="strict-indicator" class="status-text">Strict: ON</span>
          </div>
        </div>
      </main>

      <!-- Controls -->
      <footer class="controls">
        <button id="btn-pause" class="btn btn-primary" type="button">
          <svg id="icon-pause" class="btn-icon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <rect x="6" y="4" width="4" height="16" rx="1"/>
            <rect x="14" y="4" width="4" height="16" rx="1"/>
          </svg>
          <svg id="icon-play" class="btn-icon hidden" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <polygon points="5,3 19,12 5,21"/>
          </svg>
          <span id="btn-pause-text">Pause</span>
        </button>
        <button id="btn-reset" class="btn btn-secondary" type="button">
          <svg class="btn-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"/>
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
          </svg>
          <span>Reset</span>
        </button>
      </footer>

      <!-- Settings Modal -->
      <div id="settings-modal" class="modal hidden">
        <div class="modal-content">
          <div class="modal-header">
            <h2>Settings</h2>
            <button id="btn-close-settings" class="btn-icon-only">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
              </svg>
            </button>
          </div>
          <div class="settings-bar">
            <div class="setting-inputs">
              <label class="setting-input-group">
                <span class="setting-label">Work (min)</span>
                <input type="number" id="input-work-duration" min="1" max="120" value="20" class="num-input">
              </label>
              <label class="setting-input-group">
                <span class="setting-label">Break (sec)</span>
                <input type="number" id="input-break-duration" min="5" max="300" value="20" class="num-input">
              </label>
            </div>
            <button id="btn-save-settings" class="btn btn-primary" style="margin-top: 16px; width: 100%;">Save Settings</button>
          </div>
        </div>
      </div>

      <!-- Info bar -->
      <div class="info-bar">
        <span class="info-text">
          Next break in <strong id="info-countdown">00:30</strong>
        </span>
      </div>
    </div>
  </body>
</html>
